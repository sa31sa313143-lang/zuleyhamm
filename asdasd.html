<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Züleyha & Sonsuz Aşk 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* metin seçimini biraz engeller, sadece görsellik */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffdde1 0%, #ee9ca7 100%);
            font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, -apple-system, 'Pacifico', cursive, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            cursor: pointer;
        }

        /* ana kart - kalp fırtınasının önünde net okunsun */
        .hero {
            text-align: center;
            z-index: 20;
            background: rgba(255, 248, 245, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 80px 40px 80px 40px;
            padding: 2rem 3rem;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.2), 0 0 0 8px rgba(255, 215, 215, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            animation: gentleGlow 3s infinite alternate;
        }

        @keyframes gentleGlow {
            0% {
                box-shadow: 0 30px 40px rgba(0, 0, 0, 0.2), 0 0 0 6px rgba(255, 120, 160, 0.4);
                transform: scale(1);
            }
            100% {
                box-shadow: 0 35px 50px rgba(0, 0, 0, 0.3), 0 0 0 14px rgba(255, 80, 120, 0.7);
                transform: scale(1.01);
            }
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #c41e3a, #ff6b81, #ff2e4d);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.1);
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
        }

        .sub {
            font-size: 1.5rem;
            color: #b13b4b;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .sub span {
            background: rgba(255,240,245,0.8);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 1.1rem;
        }

        /* tüm ekranda kalplerin konteynırı */
        .heart-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* tıklamalar hero'ya gitsin */
            overflow: hidden;
            z-index: 10;
        }

        /* her bir kalp stili */
        .floating-heart {
            position: absolute;
            font-size: 1.8rem;
            pointer-events: none;
            user-select: none;
            opacity: 0.9;
            animation: floatHeart linear forwards;
            z-index: 15;
            filter: drop-shadow(0 0 5px rgba(255, 80, 120, 0.5));
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.6);
                opacity: 1;
            }
            70% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        /* sürekli fışkıran kalpler için patlama efekti (sayfa yüklenir) */
        .burst-heart {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            filter: drop-shadow(0 0 3px crimson);
            animation: burstOut 1s ease-out forwards;
            z-index: 25;
        }

        @keyframes burstOut {
            0% {
                transform: scale(0.2) rotate(0deg);
                opacity: 1;
            }
            80% {
                opacity: 0.8;
            }
            100% {
                transform: scale(1.5) rotate(40deg);
                opacity: 0;
            }
        }

        /* fare takip eden ekstra kalpler (cute) */
        .cursor-heart {
            position: fixed;
            font-size: 1.6rem;
            pointer-events: none;
            z-index: 999;
            animation: cursorFade 1s forwards;
            filter: drop-shadow(0 0 4px hotpink);
        }

        @keyframes cursorFade {
            0% {
                transform: scale(0.3) translateY(0px);
                opacity: 1;
            }
            100% {
                transform: scale(1.2) translateY(-40px);
                opacity: 0;
            }
        }

        /* tıklama ile patlama efekti için buton hissi */
        button {
            background: #ff4d6d;
            border: none;
            padding: 12px 28px;
            margin-top: 30px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            font-family: inherit;
        }

        button:hover {
            background: #c9184a;
            transform: scale(1.02);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }

        /* responsive */
        @media (max-width: 650px) {
            h1 {
                font-size: 2.8rem;
            }
            .hero {
                padding: 1.2rem 2rem;
                margin: 1rem;
            }
            .sub {
                font-size: 1rem;
            }
            .floating-heart {
                font-size: 1.3rem;
            }
        }

        /* sürekli yeni kalplerin akması için alt bilgi */
        footer {
            position: fixed;
            bottom: 12px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: #fff0f3;
            background: rgba(0,0,0,0.2);
            width: fit-content;
            margin: 0 auto;
            padding: 4px 14px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            z-index: 20;
            font-weight: 500;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="heart-container" id="heartContainer"></div>

<div class="hero">
    <h1>💘 Züleyha 💘</h1>
    <div class="sub">
        <span>✨ Canımmm ✨</span>
        <span>🌸 Güzelimm 🌸</span>
    </div>
    <button id="loveBurstBtn">💖 Kalp Patlat 💖</button>
</div>
<footer>❤️ ❤️</footer>

<script>
    (function() {
        // ---- ZÜLEYHA'NIN SİTESİ - HER YERDEN KALP FIŞKIRMASI ----
        const container = document.getElementById('heartContainer');
        
        // 1. SÜREKLİ KALP YAĞMURU (fışkıran ana akım)
        let rainInterval = null;
        let isRaining = true;
        
        // Kalp simgeleri listesi (çeşitlilik)
        const heartSymbols = ['❤️', '💖', '💗', '💓', '💕', '💞', '💘', '💝', '🧡', '💛', '💚', '💙', '💜', '🤍', '🩷', '❤️‍🔥', '💟', '❣️'];
        
        // rastgele aralık üret (0.3s - 1.2s arası yeni kalp)
        function getRandomDelay() {
            return Math.random() * 500 + 200; // 200-700 ms
        }
        
        // rastgele pozisyon X (genişlik)
        function randomX() {
            return Math.random() * window.innerWidth;
        }
        
        // rastgele boyut (1rem ile 2.8rem arası)
        function randomFontSize() {
            return (Math.random() * 1.8 + 1).toFixed(1) + 'rem';
        }
        
        // rastgele animasyon süresi (3s - 7s arası)
        function randomDuration() {
            return (Math.random() * 5 + 3).toFixed(1) + 's';
        }
        
        // rastgele dönüş başlangıç açısı
        function randomRotateStart() {
            return Math.random() * 360;
        }
        
        // tek bir kalp oluştur (yukarı süzülen)
        function createFloatingHeart(isBurst = false, burstX = null, burstY = null) {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            // rastgele kalp sembolü
            const randomHeart = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.textContent = randomHeart;
            
            let leftPos;
            if (isBurst && burstX !== undefined && burstY !== undefined) {
                // patlama modu: verilen koordinat civarına yerleştir
                leftPos = burstX - 15 + (Math.random() * 40 - 20);
                // clamp
                leftPos = Math.min(window.innerWidth - 30, Math.max(5, leftPos));
                heart.style.top = burstY - 20 + (Math.random() * 50 - 25) + 'px';
                heart.style.position = 'fixed';
            } else {
                leftPos = randomX();
                heart.style.bottom = '-20px';
                heart.style.position = 'absolute';
            }
            
            heart.style.left = leftPos + 'px';
            if (!isBurst) heart.style.bottom = '-30px';
            heart.style.fontSize = randomFontSize();
            heart.style.animationDuration = randomDuration();
            // hafif rastgele başlangıç dönüşü
            heart.style.transform = `rotate(${randomRotateStart()}deg)`;
            // ekstra gölge rengi
            heart.style.filter = `drop-shadow(0 0 4px rgba(255, 60, 100, 0.6))`;
            
            container.appendChild(heart);
            
            // animasyon bitince temizle
            heart.addEventListener('animationend', () => {
                if (heart.parentNode) heart.remove();
            });
            
            // hata durumunda 8 saniye sonra temizle
            setTimeout(() => {
                if (heart.parentNode) heart.remove();
            }, 10000);
        }
        
        // Patlama efekti (bir anda 20-35 kalp fışkırt)
        function burstHeartsFromPoint(x, y) {
            const count = Math.floor(Math.random() * 20) + 20; // 20-40 arası
            for (let i = 0; i < count; i++) {
                // her kalp patlama tarzında olsun, hızlıca yukarı savrulsun
                const burstHeart = document.createElement('div');
                burstHeart.classList.add('burst-heart');
                const heartChar = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                burstHeart.textContent = heartChar;
                // patlama pozisyonu (x,y yakını)
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 70;
                const offsetX = Math.cos(angle) * radius;
                const offsetY = Math.sin(angle) * radius - 30; // yukarı eğilim
                burstHeart.style.left = (x + offsetX) + 'px';
                burstHeart.style.top = (y + offsetY) + 'px';
                burstHeart.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
                burstHeart.style.position = 'fixed';
                burstHeart.style.zIndex = '30';
                burstHeart.style.opacity = '0.9';
                // özel animasyon ekleyelim (burst animasyonu)
                burstHeart.style.animation = `burstOut 0.8s ease-out forwards`;
                container.appendChild(burstHeart);
                
                burstHeart.addEventListener('animationend', () => {
                    if (burstHeart.parentNode) burstHeart.remove();
                });
                setTimeout(() => {
                    if (burstHeart.parentNode) burstHeart.remove();
                }, 1000);
            }
            // ek olarak aynı anda ekstra 10 tane normal yüzen kalp de eklenebilir (coşku)
            for (let i = 0; i < 10; i++) {
                createFloatingHeart(true, x, y);
            }
        }
        
        // rastgele konumda patlama yap (tüm ekranı saran kalp fışkırması)
        function randomScreenBurst() {
            const randX = Math.random() * window.innerWidth;
            const randY = Math.random() * window.innerHeight;
            burstHeartsFromPoint(randX, randY);
        }
        
        // ana kalp yağmurunu başlat (sürekli)
        function startHeartRain() {
            if (rainInterval) clearInterval(rainInterval);
            rainInterval = setInterval(() => {
                if (isRaining) {
                    // Her intervalda 1-3 kalp arası ekleyelim daha yoğun hissettirsin
                    const count = Math.floor(Math.random() * 2) + 1; // 1 veya 2 kalp
                    for (let i = 0; i < count; i++) {
                        createFloatingHeart(false);
                    }
                }
            }, 300); // 300ms'de 1-2 kalp => dakikada 200+ kalp, heryerden fışkırır
        }
        
        // butona tıklama ile muazzam patlama (tüm ekranı saran binlercesi gibi hissettirsin)
        function megaLoveBlast() {
            // 1- merkezden büyük patlama
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            burstHeartsFromPoint(centerX, centerY);
            
            // 2- rastgele 5 farklı noktada patlat (çok kalp)
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    const randomSideX = Math.random() * window.innerWidth;
                    const randomSideY = Math.random() * window.innerHeight;
                    burstHeartsFromPoint(randomSideX, randomSideY);
                }, i * 70);
            }
            
            // 3- ek olarak tüm ekranı saran 30 kalp yağmuru gibi ekstra
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    createFloatingHeart(true, Math.random() * window.innerWidth, Math.random() * window.innerHeight);
                }, i * 25);
            }
            
            // Kısa süreliğine yoğun yağmur moduna geç (5 saniye süper yoğun)
            const originalInterval = rainInterval;
            if (rainInterval) clearInterval(rainInterval);
            let superDense = setInterval(() => {
                for (let s = 0; s < 4; s++) {
                    createFloatingHeart(false);
                }
            }, 150);
            setTimeout(() => {
                clearInterval(superDense);
                startHeartRain(); // eski yoğunluğa dön
            }, 4000);
        }
        
        // fareyi takip eden küçük kalpler (heryerden fışkırsın ekstra)
        let lastCursorX = 0, lastCursorY = 0;
        let cursorHeartThrottle = false;
        
        function createCursorHeart(x, y) {
            if (cursorHeartThrottle) return;
            cursorHeartThrottle = true;
            const heartEl = document.createElement('div');
            heartEl.classList.add('cursor-heart');
            const randomHeartIcon = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heartEl.textContent = randomHeartIcon;
            heartEl.style.left = (x - 12) + 'px';
            heartEl.style.top = (y - 20) + 'px';
            heartEl.style.fontSize = (Math.random() * 1.2 + 0.8) + 'rem';
            heartEl.style.position = 'fixed';
            heartEl.style.pointerEvents = 'none';
            heartEl.style.zIndex = '9999';
            document.body.appendChild(heartEl);
            setTimeout(() => {
                if (heartEl && heartEl.parentNode) heartEl.remove();
            }, 1000);
            setTimeout(() => {
                cursorHeartThrottle = false;
            }, 70);
        }
        
        // fare hareketi ile kalpler
        document.addEventListener('mousemove', (e) => {
            lastCursorX = e.clientX;
            lastCursorY = e.clientY;
            createCursorHeart(lastCursorX, lastCursorY);
        });
        
        // dokunmatik cihazlar için touchmove (mobilde kalp izi)
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length) {
                const touch = e.touches[0];
                createCursorHeart(touch.clientX, touch.clientY);
            }
        });
        
        document.addEventListener('click', (e) => {
            // tıklanan noktaya özel patlama efekti (her tıklama da kalp patlasın)
            burstHeartsFromPoint(e.clientX, e.clientY);
            // ekstra bir iki kalp daha
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createFloatingHeart(true, e.clientX + (Math.random() - 0.5) * 40, e.clientY + (Math.random() - 0.5) * 40);
                }, i * 20);
            }
        });
        
        // buton patlatma
        const loveBtn = document.getElementById('loveBurstBtn');
        if (loveBtn) {
            loveBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                megaLoveBlast();
                // butonun üzerinde de ekstra efekt
                const rect = loveBtn.getBoundingClientRect();
                const btnX = rect.left + rect.width / 2;
                const btnY = rect.top + rect.height / 2;
                burstHeartsFromPoint(btnX, btnY);
            });
        }
        
        // sayfa yüklendiğinde hemen yoğun kalp patlaması "heryerden fışkırma" başlangıcı
        function initialBurst() {
            // 0.5 saniye içinde birçok patlama
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    randomScreenBurst();
                }, i * 120);
            }
            // bolca yüzen kalp de başlat
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    createFloatingHeart(false);
                }, i * 70);
            }
        }
        
        // kalp yağmurunu başlat
        startHeartRain();
        
        // ilk açılışta büyük bir gösteri yap
        initialBurst();
        
        // periyodik olarak her 10 saniyede bir rastgele patlama (sürekli heryerden fışkırsın)
        setInterval(() => {
            // rastgele bölgeye minik patlama
            if (Math.random() > 0.4) { // %60 ihtimalle ekstra
                const randomXVal = Math.random() * window.innerWidth;
                const randomYVal = Math.random() * window.innerHeight;
                burstHeartsFromPoint(randomXVal, randomYVal);
            }
            // ayrıca yoğunluk hissi için 2-3 tane daha yüzen kalp
            for (let i = 0; i < 2; i++) {
                setTimeout(() => createFloatingHeart(false), 50);
            }
        }, 7000);
        
        // sayfa boyutu değiştiğinde kalplerin taşmaması için ekstra (herhangi bir hata yok)
        window.addEventListener('resize', () => {
            // hiçbir şey yapma gerek yok, sadece yeni kalpler yeni boyuta göre randomX alır
        });
        
        // mobil cihazlarda daha sık kalp fışkırması için touch dokunma
        document.body.addEventListener('touchstart', (e) => {
            if (e.touches.length) {
                const t = e.touches[0];
                burstHeartsFromPoint(t.clientX, t.clientY);
            }
        });
        
        // her 2 saniyede bir background'da sol alttan sağ üste kalp fışkırması ekstra
        setInterval(() => {
            // gizli kalp fışkırtma: kenarlardan
            const edge = Math.floor(Math.random() * 4);
            let x = 0, y = 0;
            if (edge === 0) { // üst
                x = Math.random() * window.innerWidth;
                y = 5;
            } else if (edge === 1) { // sağ
                x = window.innerWidth - 10;
                y = Math.random() * window.innerHeight;
            } else if (edge === 2) { // alt
                x = Math.random() * window.innerWidth;
                y = window.innerHeight - 10;
            } else { // sol
                x = 5;
                y = Math.random() * window.innerHeight;
            }
            burstHeartsFromPoint(x, y);
        }, 4500);
        
        // küçük bir not: züleyha yazısının sürekli görünmesi için hero kartı sabit
        console.log('a ');
    })();
</script>
</body>
</html>
